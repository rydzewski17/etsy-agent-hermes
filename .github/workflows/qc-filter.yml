name: 3 - QC Filter
on:
  workflow_run:
    workflows: ["2 - Design Generation"]
    types: [completed]
  workflow_dispatch: {}
jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/qc_filter.py
      - name: Commit QC results
        run: |
          git config user.name "hermes-agent-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: QC results"
          git push
