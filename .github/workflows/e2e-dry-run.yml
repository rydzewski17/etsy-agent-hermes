name: Etsy-Hermes E2E Dry Run

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/e2e-dry-run.yml"
      - "requirements.txt"

jobs:
  dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline Etsy-Hermes dry run
        run: python scripts/e2e_dry_run.py

      - name: Upload dry-run report and generated assets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etsy-hermes-e2e-dry-run
          path: |
            data/dry_run_reports/latest_e2e_dry_run.json
            data/bundles/*_bundle.zip
            data/previews/*_preview.png
          if-no-files-found: warn
