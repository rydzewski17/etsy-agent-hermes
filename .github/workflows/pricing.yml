name: 5 - Pricing
on:
  workflow_run:
    workflows: ["4 - Listing Copy"]
    types: [completed]
  workflow_dispatch: {}
jobs:
  price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/pricing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ETSY_KEY_STRING: ${{ secrets.ETSY_KEY_STRING }}
      - name: Commit pricing
        run: |
          git config user.name "hermes-agent-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: pricing"
          git push
